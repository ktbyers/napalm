---
name: build
on: [push, pull_request]
permissions:
  contents: read

jobs:
  linters:
    name: linters
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: x64

      - name: Install poetry
        run: |
          pipx install poetry

      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'poetry'

      - name: Install dependencies
        run: |
          poetry install

      - name: Run pylama
        run: |
          poetry run pylama .

      - name: Run black
        run: |
          poetry run black --check .

      - name: Run type checker
        run: |
          poetry run mypy --version
          poetry run mypy -p napalm --config-file mypy.ini

  std_tests:
    name: std_tests
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        python-version: ['3.10', '3.11', "3.12", "3.13", "3.14"]
        platform: [ubuntu-24.04]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - uses: actions/checkout@v4

      - name: Install poetry
        run: |
          pipx install poetry

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      - name: Install dependencies
        run: |
          poetry install

      - name: Run Tests
        run: |
          poetry run pytest --cov=napalm --cov-report term-missing -vs --pylama

  std_tests_macos:
    name: std_tests_macos
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        python-version: [ '3.12', '3.13', '3.14' ]
        platform: [macos-15]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - uses: actions/checkout@v4

      - name: Install poetry
        run: |
          pipx install poetry

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          poetry install

      - name: Run Tests
        run: |
          poetry run pytest --cov=napalm --cov-report term-missing -vs --pylama

  build_docs:
    name: build_docs
    needs: std_tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: x64

      - name: Install poetry
        run: |
          pipx install poetry

      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'poetry'

      - name: Install dependencies
        run: |
          poetry install --with docs

      - name: Doctests
        run: |
          make doctest

